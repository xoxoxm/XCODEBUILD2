name: 构建并导出 IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 检出代码（不使用 LFS）
        uses: actions/checkout@v4

      - name: 从 Release 下载大文件
        run: |
          mkdir -p Libraries
          if [ ! -f Libraries/libiPhone-lib.a ] || [ $(stat -f%z Libraries/libiPhone-lib.a) -lt 1000000 ]; then
            echo "正在从 Release 下载 libiPhone-lib.a..."
            curl -L -o Libraries/libiPhone-lib.a "https://github.com/xoxoxm/XCODEBUILD2/releases/download/v1.0/libiPhone-lib.a"
          fi
          if [ ! -f Libraries/libil2cpp.a ] || [ $(stat -f%z Libraries/libil2cpp.a) -lt 1000000 ]; then
            echo "正在从 Release 下载 libil2cpp.a..."
            curl -L -o Libraries/libil2cpp.a "https://github.com/xoxoxm/XCODEBUILD2/releases/download/v1.0/libil2cpp.a"
          fi

      - name: 安装签名证书和描述文件
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION }}
        run: |
          echo "$CERT_BASE64" | base64 -d -o certificate.p12
          echo "$MOBILEPROVISION_BASE64" | base64 -d -o profile.mobileprovision

          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import certificate.p12 -k temp.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k temp temp.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: 构建并导出 IPA
        run: |
          xcodebuild archive \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -archivePath build/Unity-iPhone.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=8783M6Z5Q4

          /usr/libexec/PlistBuddy -c "Add method string development" ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/Unity-iPhone.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: MyApp.ipa
          path: build/*.ipa