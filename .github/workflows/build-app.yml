name: 构建未签名优化 IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 下载大文件
        run: |
          mkdir -p Libraries
          if [ ! -f Libraries/libiPhone-lib.a ] || [ $(stat -f%z Libraries/libiPhone-lib.a) -lt 1000000 ]; then
            curl -L -o Libraries/libiPhone-lib.a "https://github.com/xoxoxm/XCODEBUILD2/releases/download/v1.0/libiPhone-lib.a"
          fi
          if [ ! -f Libraries/libil2cpp.a ] || [ $(stat -f%z Libraries/libil2cpp.a) -lt 1000000 ]; then
            curl -L -o Libraries/libil2cpp.a "https://github.com/xoxoxm/XCODEBUILD2/releases/download/v1.0/libil2cpp.a"
          fi

      - name: 构建 Archive（不签名，仅编译优化）
        run: |
          xcodebuild archive \
            -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -archivePath build/Unity-iPhone.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          if [ ! -d build/Unity-iPhone.xcarchive ]; then
            echo "❌ Archive 失败"
            exit 1
          fi
          echo "✅ Archive 成功（已自动 strip 优化）"

      - name: 提取 .app 并打包为 IPA
        run: |
          # 从 xcarchive 中找到已优化的 .app
          APP_PATH=$(find "build/Unity-iPhone.xcarchive" -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ 未找到 .app，Archive 目录结构："
            find build/Unity-iPhone.xcarchive -maxdepth 4 -type d
            exit 1
          fi

          echo "✅ .app 路径: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          # 打包为 IPA（未签名）
          mkdir -p build
          /usr/bin/zip -9 -r build/Unsigned.ipa Payload
          echo "✅ 未签名优化 IPA 已生成: build/Unsigned.ipa"

      - name: 上传 IPA
        uses: actions/upload-artifact@v6
        with:
          name: Unsigned-Optimized-IPA
          path: build/Unsigned.ipa
          retention-days: 1